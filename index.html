<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Asteroid Miner</title>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      body { background: #000; overflow: hidden; width: 100vw; height: 100vh; }
      #game-canvas { display: block; width: 100vw; height: 100vh; }
      #ui-overlay {
        position: fixed; top: 0; left: 0; width: 100%; height: 100%;
        pointer-events: none; z-index: 10;
      }
      #debug-overlay {
        position: fixed; top: 8px; right: 8px;
        font: 12px/1.6 monospace; color: #0f0;
        background: rgba(0,0,0,0.6); padding: 6px 10px; border-radius: 4px;
        pointer-events: none; z-index: 20;
      }
      #webgl-error {
        display: none; position: fixed; inset: 0;
        background: #000; color: #f66; font: 18px monospace;
        align-items: center; justify-content: center; text-align: center;
        padding: 40px;
      }
    </style>
  </head>
  <body>
    <canvas id="game-canvas"></canvas>
    <div id="ui-overlay"></div>
    <div id="hud-mount"></div>
    <div id="debug-overlay"></div>
    <div id="controls-hint" style="
      position:fixed; bottom:12px; left:50%; transform:translateX(-50%);
      font:11px/1.9 monospace; color:rgba(160,200,255,0.7);
      background:rgba(0,0,8,0.65); padding:6px 16px; border-radius:4px;
      pointer-events:none; z-index:15; text-align:center;
      transition:opacity 1s; white-space:nowrap;
    ">
      Drag to pan &nbsp;·&nbsp; Scroll / +- to zoom &nbsp;·&nbsp;
      WASD / Arrows to move &nbsp;·&nbsp; Double-click to zoom in &nbsp;·&nbsp;
      Home to reset view &nbsp;·&nbsp; F3 debug
    </div>
    <div id="webgl-error">
      WebGL2 is required to run Asteroid Miner.<br>
      Please use a modern browser (Chrome 56+, Firefox 51+, Safari 15+).
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
